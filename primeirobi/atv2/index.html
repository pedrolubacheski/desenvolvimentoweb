<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Crie sua conta</legend>

            <label>Nome:</label>
            <input type="text" placeholder="Digite seu nome completo" required> <br>

            <label>Email</label>
            <input type="email" placeholder="Digite seu email" required> <br>

            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha" required> <br>

            <strong>Gênero:</strong><br>
            <input type="radio" name="genero">
            <label for="masculino">Masculino</label><br>
            
            <input type="radio" name="genero">
            <label for="feminino">Feminino</label>
            <br><br>

             <label for="biografia">Biografia:</label><br>
            <textarea id="biografia" placeholder="Conte um pouco sobre você..."></textarea>
            <br><br>
            
            <input type="checkbox" required>
            <label for="termos">Eu concordo com os termos de uso</label>
            <br><br>

            <button type="submit">Enviar Cadastro</button>
            
        </fieldset>
    </form>
</body>
</html>
